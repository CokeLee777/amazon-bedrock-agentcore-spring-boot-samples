server:
  port: ${AGENT_PORT:9000}

spring:
  ai:
    bedrock:
      aws:
        region: ${BEDROCK_REGION:ap-northeast-2}
      converse:
        chat:
          options:
            model: ${BEDROCK_MODEL_ID:arn:aws:bedrock:ap-northeast-2:<ID>:inference-profile/apac.amazon.nova-lite-v1:0}
    a2a:
      server:
        enabled: true

a2a:
  agent-url: ${AGENT_URL:http://localhost:9000}

remote:
  agents:
    delivery-agent:
      url: ${DELIVERY_AGENT_URL:http://localhost:9000}
    payment-agent:
      url: ${PAYMENT_AGENT_URL:http://localhost:9000}
