server:
  port: 9000

spring:
  ai:
    bedrock:
      aws:
        region: ${BEDROCK_REGION:ap-northeast-2}
      converse:
        chat:
          options:
            model: ${BEDROCK_MODEL_ID:amazon.nova-pro-v1:0}

remote:
  agent:
    urls: http://localhost:8081/,http://localhost:8082/,http://localhost:8083/

a2a:
  # This orchestrator's public base URL (AgentCard.url / JSON-RPC interface).
  # Use a Runtime-reachable URL in production; localhost is for local bootRun only.
  orchestrator-url: ${ORCHESTRATOR_URL:http://localhost:9000}
  order-agent-url: ${ORDER_AGENT_URL:http://localhost:8081}
  delivery-agent-url: ${DELIVERY_AGENT_URL:http://localhost:8082}
  payment-agent-url: ${PAYMENT_AGENT_URL:http://localhost:8083}
  client:
    timeout-seconds: ${A2A_CLIENT_TIMEOUT_SECONDS:15}
